<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Coach - Ready To Wear</title>
     <style>
         * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
         :root {
             --warmfog: #EAE5DF;
             --berrygood: #A63446;
             --soldiergreen: #4A5248;
         }
         body { background: var(--warmfog); }
         nav { position: fixed; width: 100%; top: 0; background: rgba(255,255,255,0.9); padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
         .logo { font-size: 1.8rem; font-weight: bold; color: var(--soldiergreen); }
         .nav-links a { text-decoration: none; color: var(--soldiergreen); margin-left: 1.5rem; }
         .nav-links a:hover, .nav-links a.active { color: var(--berrygood); font-weight: bold; }
         .banner { height: 40vh; background: url('images/wear-banner.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; margin-top: 80px; }
         .banner h1 { color: white; font-size: 3rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
         .products-section { max-width: 1200px; margin: 5rem auto; padding: 0 2rem; }
         .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
         .product-card { background: white; padding: 1rem; border-radius: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
         .product-img { height: 300px; margin-bottom: 1rem; border-radius: 8px; overflow: hidden; }
         .product-img img { width: 100%; height: 100%; object-fit: cover; }
         .product-card h3 { color: var(--soldiergreen); margin-bottom: 0.5rem; }
         .product-card p { color: var(--berrygood); font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; }
         .btn { background: var(--soldiergreen); color: white; padding: 0.7rem 2rem; text-decoration: none; border-radius: 30px; font-weight: bold; }
         footer { background: var(--soldiergreen); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
     </style>
 </head>
 <body>
     <nav>
         <div class="logo">COACH</div>
         <div class="nav-links">
             <a href="index.html">Home</a>
             <a href="bags.html">Bags</a>
             <a href="accessories.html">Accessories</a>
             <a href="wear.html" class="active">Wear</a>
             <a href="about.html">About Us</a>
             <a href="feedback.html">Feedback</a>
         </div>
     </nav>
     <header class="banner">
         <h1>Ready To Wear</h1>
     </header>
     <section class="products-section">
         <div class="products">
             <div class="product-card">
                 <div class="product-img"><img src="images/jacket.jpg" alt="Jacket"></div>
                 <h3>Leather Jacket</h3>
                 <p>$950</p>
                 <a href="#" class="btn">Add to Cart</a>
             </div>
             <div class="product-card">
                 <div class="product-img"><img src="images/dress.jpg" alt="Dress"></div>
                 <h3>Signature Dress</h3>
                 <p>$450</p>
                 <a href="#" class="btn">Add to Cart</a>
             </div>
             <div class="product-card">
                 <div class="product-img"><img src="images/shoes.jpg" alt="Shoes"></div>
                 <h3>Leather Loafers</h3>
                 <p>$295</p>
                 <a href="#" class="btn">Add to Cart</a>
             </div>
         </div>
     </section>
     <footer>
         <p>&copy; 2026 Coach. All rights reserved.</p>
     </footer>
 </body>
 </html>
